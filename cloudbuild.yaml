# Aqarkom CI/CD - GCP Cloud Build
# Region: me-central1 (Dammam) for Saudi data residency

steps:
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        corepack enable
        pnpm install --frozen-lockfile
    id: 'install'

  - name: 'node:20-alpine'
    entrypoint: 'pnpm'
    args: ['build']
    id: 'build'
    waitFor: ['install']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aqarkom/api:${SHORT_SHA}'
      - '-f'
      - 'Dockerfile.gcp'
      - '.'
    id: 'build-api'
    waitFor: ['build']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aqarkom/api:${SHORT_SHA}'
    id: 'push-api'
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'aqarkom-api'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aqarkom/api:${SHORT_SHA}'
      - '--region'
      - 'me-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'deploy-api'
    waitFor: ['push-api']

substitutions:
  _REGION: 'me-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
